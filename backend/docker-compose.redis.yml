# Minimal Redis-only compose for local development
# Usage: npm run redis:start  (then  npm run dev)
#        npm run redis:stop   (to stop)

services:
  redis:
    image: redis:7-alpine
    container_name: ai-suite-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --save "" --appendonly no